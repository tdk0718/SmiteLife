<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmiteLife - 鍛冶師の生活</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #ui {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-family: monospace;
      font-size: 13px;
      padding: 10px 18px;
      border-radius: 8px;
      pointer-events: none;
      display: flex;
      gap: 20px;
    }
    #ui span { white-space: nowrap; }
    #title {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffd700;
      font-family: serif;
      font-size: 22px;
      font-weight: bold;
      text-shadow: 1px 1px 4px #000;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="title">⚒ SmiteLife</div>
  <canvas id="canvas"></canvas>
  <div id="ui">
    <span>WASD: 移動</span>
    <span>マウスドラッグ: カメラ回転</span>
    <span>Space: ジャンプ</span>
    <span>Shift: ダッシュ</span>
    <span>E: インタラクト</span>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
